<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>شاورمة الدمشقیة</title>
    <link rel="manifest" href="manifest.json?v=113">
    <link rel="stylesheet" href="css/style.css?v=113">
    <script src="js/app.js?v=113"></script>
    <script>
        (function () {
            var splash = document.getElementById('logoSplash');
            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(function () { splash.style.display = 'none'; }, 500);
            }
            window.addEventListener('load', function () {
                setTimeout(hideSplash, 1200);
            });
            setTimeout(hideSplash, 3500);

            var logo = document.getElementById('indexLogo');
            setupLogoClickActions(logo, function () {
                replayLogoSplash(splash);
            });
        })();
    </script>
</body>
</html>

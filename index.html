<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مطعم الدمشقي</title>
    <link rel="manifest" href="manifest.json?v=117">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/shawarma demeshq-logo.jpg?v=1">
    <meta name="application-name" content="Shawarma">
    <meta name="msapplication-TileColor" content="#5C4033">
    <meta name="msapplication-TileImage" content="assets/shawarma demeshq-logo.jpg?v=1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shawarma">
    <meta name="theme-color" content="#8B6914">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=117">
    <style>
        :lang(en) {
            font-family: var(--font-body);
        }
        :lang(ar), :lang(ku) {
            font-family: var(--font-arabic);
        }
        .cafe-name {
            font-family: inherit;
            letter-spacing: 0.05em;
            font-size: clamp(2.2rem, 8vw, 4.2rem);
            font-weight: 700;
            line-height: 1.05;
            text-transform: none;
            color: #F7D87D;
            text-shadow: 0 2px 20px rgba(0,0,0,0.24);
        }
        .logo-splash-text {
            font-family: inherit;
            letter-spacing: 0.02em;
            font-size: 1.1rem;
        }
        .lang-btn,
        .lang-sep {
            font-family: inherit;
        }
    </style>
</head>
<body class="index-page has-video-bg">

    <div class="logo-splash" id="logoSplash">
        <img src="assets/shawarma demeshq-logo.jpg?v=1" alt="Shawarma" onerror="this.onerror=null; this.src='assets/logo.svg';">
        <span class="logo-splash-text">مطعم الدمشقي</span>
        <div class="logo-splash-dots"><span></span><span></span><span></span></div>
    </div>

    <video class="bg-video" autoplay muted loop playsinline>
        <source src="images/menu-bg.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <section class="hero">
        <div class="hero-center">
<div class="logo-float-wrap">
                 <img src="assets/shawarma demeshq-logo.jpg?v=1" alt="Shawarma" class="logo" id="indexLogo"
                     onerror="this.onerror=null; this.src='assets/logo.svg';">
               </div>
               <h1 class="cafe-name">
                 <span class="menu-hero-typewriter" id="heroTypewriter" aria-live="polite">
                     <span class="menu-hero-typed" id="heroTitleTyped" dir="rtl">مطعم الدمشقي</span><span class="menu-hero-cursor" id="heroTitleCursor" aria-hidden="true"></span>
                 </span>
               </h1>

            <div class="lang-group">
                <button class="lang-btn" data-lang="ku" onclick="openMenu('ku')">
                    <span class="lang-flag"><img src="images/flag-kurdistan.svg" alt="" class="lang-flag-img" width="22" height="15"></span>
                    <span>کوردی</span>
                </button>
                <span class="lang-sep">|</span>
                <button class="lang-btn" data-lang="ar" onclick="openMenu('ar')">
                    <span class="lang-flag">🇮🇶</span>
                    <span>العربية</span>
                </button>
                <span class="lang-sep">|</span>
                <button class="lang-btn" data-lang="en" onclick="openMenu('en')">
                    <span class="lang-flag">🇬🇧</span>
                    <span>English</span>
                </button>
            </div>
        </div>
    </section>

    <script src="js/app.js?v=117"></script>
    <script>
        (function () {
            var splash = document.getElementById('logoSplash');
            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(function () { splash.style.display = 'none'; }, 500);
            }
            window.addEventListener('load', function () {
                setTimeout(hideSplash, 1200);
            });
            setTimeout(hideSplash, 3500);

            var logo = document.getElementById('indexLogo');
            setupLogoClickActions(logo, function () {
                replayLogoSplash(splash);
            });
        })();
    </script>
</body>
</html>

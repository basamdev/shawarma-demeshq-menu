<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Diagnostic</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .count { font-size: 28px; font-weight: bold; color: #2563EB; }
        .label { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; margin: 4px; background: #e5e7eb; color: #374151; }
        .badge-missing { background: #fee2e2; color: #991b1b; }
        .badge-hidden { background: #fef3c7; color: #92400e; }
        .badge-ok { background: #d1fae5; color: #065f46; }
        pre { background: #f4f4f4; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; max-height: 300px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; }
        .error { color: #dc2626; }
        .success { color: #059669; }
    </style>
</head>
<body>
    <h1>Menu Diagnostic</h1>
    <div id="summary">
        <div class="card">
            <div class="label">Connection</div>
            <div id="connectionStatus">Checking...</div>
        </div>
        <div class="card">
            <div class="label">Total menuItems</div>
            <div id="totalCount" class="count">-</div>
        </div>
        <div class="card">
            <div class="label">Items filtered out</div>
            <div id="filteredCount" class="count">-</div>
            <div id="filteredReasons" style="margin-top:10px;"></div>
        </div>
        <div class="card">
            <div class="label">Categories in Firestore</div>
            <div id="firestoreCategories"></div>
        </div>
        <div class="card">
            <div class="label">Unique item.category values</div>
            <div id="itemCategoryValues"></div>
        </div>
        <div class="card">
            <div class="label">Cached categories (localStorage)</div>
            <div id="cachedCategories"></div>
        </div>
        <div class="card">
            <div class="label">Filtered items detail</div>
            <div id="filteredItemsDetail"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js"></script>
    <script>
        const connectionEl = document.getElementById('connectionStatus');
        const totalCountEl = document.getElementById('totalCount');
        const filteredCountEl = document.getElementById('filteredCount');
        const filteredReasonsEl = document.getElementById('filteredReasons');
        const firestoreCategoriesEl = document.getElementById('firestoreCategories');
        const itemCategoryValuesEl = document.getElementById('itemCategoryValues');
        const cachedCategoriesEl = document.getElementById('cachedCategories');
        const filteredItemsDetailEl = document.getElementById('filteredItemsDetail');

        function setStatus(el, html, cssClass) {
            el.innerHTML = '<span class="' + cssClass + '">' + html + '</span>';
        }

        function badge(text, type) {
            return '<span class="badge badge-' + type + '">' + text + '</span>';
        }

        function renderTable(rows) {
            if (!rows.length) return '<div style="color:#666;padding:10px 0;">None</div>';
            let html = '<table><thead><tr><th>ID</th><th>Name (en)</th><th>Category</th><th>Available</th><th>Reason</th></tr></thead><tbody>';
            rows.forEach(function(r) {
                html += '<tr>' +
                    '<td>' + r.id + '</td>' +
                    '<td>' + (r.nameEn || r.nameKu || r.nameAr || '-') + '</td>' +
                    '<td>' + (r.category || '<em class=\"error\">missing</em>') + '</td>' +
                    '<td>' + (r.available === false ? '<span class=\"error\">false</span>' : 'true') + '</td>' +
                    '<td>' + (r.reason || '-') + '</td>' +
                '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function analyze() {
            if (firebase.apps.length === 0) {
                setStatus(connectionEl, 'Firebase NOT initialized', 'error');
                return;
            }
            setStatus(connectionEl, 'Firebase initialized — project: ' + firebaseConfig.projectId, 'success');

            var categoryStats = {};
            var totalItems = 0;
            var filteredItems = [];
            var missingCategoryCount = 0;
            var waterCategoryCount = 0;
            var unavailableCount = 0;

            db.collection('menuItems').get().then(function(snap) {
                totalItems = snap.size;
                totalCountEl.textContent = totalItems;

                snap.forEach(function(doc) {
                    var data = doc.data();
                    var cat = (data.category || '').trim();
                    var reasons = [];

                    if (!cat) {
                        missingCategoryCount++;
                        reasons.push('missing category');
                    }
                    if (cat.toLowerCase() === 'water') {
                        waterCategoryCount++;
                        reasons.push('water category');
                    }
                    if (data.available === false) {
                        unavailableCount++;
                        reasons.push('available=false');
                    }

                    if (reasons.length > 0) {
                        filteredItems.push({
                            id: doc.id,
                            nameEn: data.name_en,
                            nameKu: data.name_ku,
                            nameAr: data.name_ar,
                            category: cat,
                            available: data.available,
                            reason: reasons.join(', ')
                        });
                    }

                    if (cat) categoryStats[cat] = (categoryStats[cat] || 0) + 1;
                });

                filteredCountEl.textContent = filteredItems.length;
                filteredReasonsEl.innerHTML =
                    badge('Missing category: ' + missingCategoryCount, 'missing') +
                    badge('Water category: ' + waterCategoryCount, 'hidden') +
                    badge('Available=false: ' + unavailableCount, 'hidden');

                firestoreCategoriesEl.innerHTML = '<pre>' + JSON.stringify(categoryStats, null, 2) + '</pre>';

                var uniqueCats = Object.keys(categoryStats).sort();
                itemCategoryValuesEl.innerHTML = uniqueCats.map(function(c) {
                    return badge(c + ' (' + categoryStats[c] + ')', 'ok');
                }).join('') || '<div style="color:#666;">None</div>';

                var cached = localStorage.getItem('cachedCategories');
                var cachedObj = [];
                if (cached) {
                    try { cachedObj = JSON.parse(cached); } catch(e) {}
                }
                cachedCategoriesEl.innerHTML = '<pre>' + JSON.stringify(cachedObj, null, 2) + '</pre>';

                filteredItemsDetailEl.innerHTML = renderTable(filteredItems);
            }).catch(function(err) {
                setStatus(connectionEl, 'Error: ' + err.message, 'error');
            });
        }

        analyze();
    </script>
</body>
</html>

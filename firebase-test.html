<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <div id="results"></div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type) {
            const div = document.createElement('div');
            div.className = 'status ' + type;
            div.innerHTML = message;
            resultsDiv.appendChild(div);
        }
        
        addResult('Testing Firebase configuration...', 'info');
        addResult('Project ID: <strong>shawarma-demashq-menu</strong>', 'info');
        
        if (firebase.apps.length === 0) {
            addResult('Firebase not initialized!', 'error');
        } else {
            addResult('Firebase initialized successfully!', 'success');
            addResult('Environment: ' + window.firebaseEnvironment, 'info');
            addResult('Auth Domain: ' + firebaseConfig.authDomain, 'info');
            
            if (typeof db !== 'undefined') {
                addResult('Firestore instance created', 'success');
                
                db.collection('categories').get()
                    .then(snapshot => {
                        addResult('Categories loaded: ' + snapshot.size, 'success');
                        snapshot.forEach(doc => {
                            var data = doc.data();
                            var name = data.name_en || data.name || doc.id;
                            addResult('Category: ' + name + ' (id: ' + doc.id + ')', 'info');
                        });
                    })
                    .catch(error => {
                        addResult('Error loading categories: ' + error.message, 'error');
                    });
                
                db.collection('menuItems').get()
                    .then(snapshot => {
                        addResult('Menu items loaded: ' + snapshot.size, 'success');
                        snapshot.forEach(doc => {
                            var data = doc.data();
                            var name = data.name_en || data.name || 'Unknown';
                            var cat = data.category || 'No category';
                            addResult('Item: ' + name + ' - Category: ' + cat, 'info');
                        });
                    })
                    .catch(error => {
                        addResult('Error loading menu items: ' + error.message, 'error');
                    });
            }
        }
    </script>
</body>
</html>
